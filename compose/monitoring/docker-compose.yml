services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /volume1/homelab/appdata/monitoring/prometheus:/prometheus

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana

    restart: unless-stopped

    depends_on:
      - prometheus

    ports:
      - "3000:3000"

    volumes:
      - /volume1/homelab/appdata/monitoring/grafana:/var/lib/grafana

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter

    restart: unless-stopped

    command:
      - --path.rootfs=/host
      - --collector.textfile.directory=/textfile

    ports:
      - "9100:9100"

    volumes:
      - /:/host:ro,rslave
      - /volume1/homelab/appdata/monitoring/textfile:/textfile:ro
