services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    
    networks:
      - homelab

    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris

    ports:
      - "8989:8989"

    volumes:
      - /volume1/homelab/appdata/sonarr:/config
      - /volume1/homelab/media/tv:/tv
      - /volume1/homelab/downloads:/downloads

networks:
  homelab:
    external: true
