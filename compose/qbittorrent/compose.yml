services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent

    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - WEBUI_PORT=8080

    ports:
      - "8080:8080"

    volumes:
      - /volume1/homelab/appdata/qbittorrent:/config
      - /volume1/homelab/downloads:/downloads

    networks:
      - homelab

networks:
  homelab:
    external: true
